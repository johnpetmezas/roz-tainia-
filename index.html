<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Η Ροζ Ταινία Mas | Sequence Scrollytelling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Fixed Branding -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Antigravity</span>
    </div>

    <!-- 1. Intro Hero -->
    <section id="hero">
      <div class="bg-watermark">ROZ TAINIA.</div>
      <h1 class="hero-title">Αυτή είναι η ροζ ταινία μας</h1>
      <p class="hero-subtitle">ΜΙΑ ΙΣΤΟΡΙΑ ΓΕΜΑΤΗ ΜΥΣΤΗΡΙΟ ΚΑΙ... ΡΟΖ ΧΡΩΜΑ.</p>
    </section>

    <!-- 2. Scrollytelling Sequence (Canvas) -->
    <div id="scrolly-container">
      <canvas id="sequence-canvas"></canvas>
      
      <div class="sticky-overlays">
        <div class="bubble-text">PINK.</div>
        <span class="snippet" id="snippet-1">Προσεχώς στις οθόνες σας...</span>
        <span class="snippet" id="snippet-2">Μια παραγωγή που θα συζητηθεί.</span>
        <span class="snippet" id="snippet-3">Είσαι έτοιμος για την αποκάλυψη;</span>
      </div>
    </div>

    <!-- 3. Climax -->
    <section id="destination">
      <div class="barcode-wrapper">
        <div class="barcode"></div>
        <span class="barcode-num">0 123 4567 8</span>
      </div>
      <div class="content-wrapper">
        <button class="click-btn" id="click-me">ΔΕΣ ΤΗΝ ΤΑΙΝΙΑ</button>
      </div>
    </section>

    <!-- 4. Final -->
    <section id="final">
      <h2 class="final-question">Θες ακόμα να δεις τη ροζ ταινία;</h2>
      <div class="btn-group">
        <button class="final-button yes" id="yes-btn">Ναι</button>
        <button class="final-button no" id="no-btn">Όχι</button>
      </div>
      <p id="no-response" class="hidden-text">Κρίμα...</p>
    </section>

    <div class="overlay" id="alert-overlay">
      <div class="reveal-content">
        <h2 class="naughty-text">Α ρε πονηρούλη!</h2>
        <button class="modal-btn" id="close-modal">Κλείσιμο</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
