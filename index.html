<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Η Ροζ Ταινία Mas | Sequence Scrollytelling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Fixed Branding -->
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Antigravity</span>
    </div>

    <!-- 1. Intro Hero -->
    <section id="hero">
      <h1 class="hero-title">Αυτή είναι η ροζ ταινία μας</h1>
    </section>

    <!-- 2. Scrollytelling Sequence (Canvas) -->
    <div id="scrolly-container">
      <canvas id="sequence-canvas"></canvas>
      
      <!-- Overlays for snippets -->
      <div class="sticky-overlays">
        <span class="snippet left" id="snippet-1">Είσαι έτοιμος;</span>
        <span class="snippet right" id="snippet-2">Συνέχισε...</span>
      </div>
    </div>

    <!-- 3. Climax -->
    <section id="destination">
      <div class="content-wrapper">
        <button class="click-btn" id="click-me">CLICK ME!</button>
      </div>
    </section>

    <!-- 4. Final -->
    <section id="final">
      <h2 class="final-question">Θες ακόμα να δεις τη ροζ ταινία;</h2>
      <div class="btn-group">
        <button class="final-button yes" id="yes-btn">Ναι</button>
        <button class="final-button no" id="no-btn">Όχι</button>
      </div>
      <p id="no-response" class="hidden-text">Κρίμα...</p>
    </section>

    <div class="overlay" id="alert-overlay">
      <div class="reveal-content">
        <h2 class="naughty-text">Α ρε πονηρούλη!</h2>
        <button class="modal-btn" id="close-modal">Κλείσιμο</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
